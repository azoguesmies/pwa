<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c5cfc"/>
      <stop offset="100%" stop-color="#00e5c0"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#g1)"/>
  <!-- Shine overlay -->
  <rect width="512" height="256" rx="96" fill="url(#g2)"/>
  <!-- NX letters -->
  <text x="256" y="320"
        font-family="Arial, sans-serif"
        font-weight="900"
        font-size="220"
        text-anchor="middle"
        fill="white"
        letter-spacing="-8">NX</text>
  <!-- Bottom accent line -->
  <rect x="156" y="370" width="200" height="8" rx="4" fill="white" opacity="0.4"/>
</svg>
